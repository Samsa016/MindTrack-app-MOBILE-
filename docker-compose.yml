version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: mindtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindtrack
      POSTGRES_PASSWORD: mindtrack_secret
      POSTGRES_DB: mindtrack
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindtrack"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
